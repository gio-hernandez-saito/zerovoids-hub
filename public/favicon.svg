<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- ZeroVoids — Three-arc void portal -->
  <g transform="rotate(-90 32 32)">
    <!-- Constellation arc (teal) -->
    <circle cx="32" cy="32" r="24" fill="none" stroke="#4ecdc4" stroke-width="4"
      stroke-dasharray="45 105.8" stroke-linecap="round"/>
    <!-- Crystal Lattice arc (coral) -->
    <circle cx="32" cy="32" r="24" fill="none" stroke="#ff6b6b" stroke-width="4"
      stroke-dasharray="45 105.8" stroke-dashoffset="-50.27" stroke-linecap="round"/>
    <!-- Nebula arc (purple) -->
    <circle cx="32" cy="32" r="24" fill="none" stroke="#6c5ce7" stroke-width="4"
      stroke-dasharray="45 105.8" stroke-dashoffset="-100.53" stroke-linecap="round"/>
  </g>
  <!-- Center void point -->
  <circle cx="32" cy="32" r="1.5" fill="rgba(255,255,255,0.2)"/>
</svg>
